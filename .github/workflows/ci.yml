name: CI

on:
  push:
    branches: [main, development, feature-*, feat/*]
  pull_request:
    branches: [main, development, feature-*, feat/*]

jobs:
  docker-build-and-test:
    name: Build & Test Backend Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build backend Docker image
        run: docker build -t backend-test ./backend
      - name: Run backend container
        run: |
          docker run -d -p 6789:6789 --name backend-test backend-test
      - name: Wait for backend to be ready
        run: sleep 10
      - name: Test /ping endpoint
        run: |
          curl --fail http://localhost:6789/ping || (docker logs backend-test && exit 1)
      - name: Stop and remove container
        if: always()
        run: |
          docker stop backend-test
          docker rm backend-test

  build:
    name: Build Backend & Frontend
    runs-on: ubuntu-latest
    needs: docker-build-and-test
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

  test:
    name: Lint & Test Backend/Frontend
    needs: [build, docker-build-and-test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      - name: Run backend lint
        working-directory: ./backend
        run: npm run lint || echo "No lint script"
      - name: Run backend tests
        working-directory: ./backend
        run: npm test || echo "No test script"
      - name: Run frontend lint
        working-directory: ./frontend
        run: npm run lint || echo "No lint script"
      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test || echo "No test script"
