name: CD Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show working directory content
        run: ls -la ./backend

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Trigger Render Deployment via Deploy Hook
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Log deploy success
        if: success()
        run: echo "✅ Backend deployed successfully!"

      - name: Log deploy failure
        if: failure()
        run: echo "❌ Backend deploy failed!"
